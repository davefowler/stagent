# stagent config — declares roles, stages, flows, and (optionally) commands.
# Loaded at runner start and on SIGHUP. See ./docs/configuration/ for details.

project: {{.Project}}

# ─── Roles ────────────────────────────────────────────────────────────
# Role prompts live at .stagent/prompts/roles/<name>.md by convention.
roles:

  developer:
    model: opus
    dangerous: true        # required true for agent roles in v1
    bound: task            # one session per (task, role); continues across loops

  reviewer:
    model: sonnet
    dangerous: true
    bound: stage           # fresh session per review pass

# ─── Tasks ────────────────────────────────────────────────────────────
# One markdown file per task at <tasks_dir>/<id>-<slug>.md.
tasks_dir: tasks

# ─── Stages ───────────────────────────────────────────────────────────
# Stage prompts live at .stagent/prompts/stages/<name>.md by convention.
# Hooks reference sections within the task file via "H2 > H3 > ..." paths.
stages:

  setup:
    type: script
    max_runs: 3
    hooks:
      enter:
        # Validate the task file before touching anything. Fails loudly
        # if a required section or checkbox is missing. (The same check
        # runs at `stagent new`; this is defense in depth.)
        - validate_task_sections: {}
        - run_shell:
            cmd: "git worktree add {{.Task.WorktreeDir}} -b {{.Task.Branch}} origin/main"
            fail_on_nonzero: true
        # Add project install / fixture steps here. Examples:
        # - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && go mod download" }
        # - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && npm ci" }
        # - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && uv sync" }
        # - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && cp .env.example .env" }

  code:
    type: agent
    role: developer
    max_runs: 7            # generous: pr, review, and human_review can all redirect back
    hooks:
      enter:
        # Rebase on every entry; on review/CI redirects, main may have moved.
        - run_shell:
            cmd: "cd {{.Task.WorktreeDir}} && git rebase origin/main"
            fail_on_nonzero: true
      exit:
        # Run your project's tests / lint / type-check. The scaffold ships
        # language-neutral — uncomment the line(s) that fit your stack.
        # - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && go test ./...",      fail_on_nonzero: true }
        # - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && go vet ./...",       fail_on_nonzero: true }
        # - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && npm test",           fail_on_nonzero: true }
        # - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && pytest",             fail_on_nonzero: true }
        # - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && cargo test",         fail_on_nonzero: true }
        - section_check:
            section: "Implementation plan"
            expect: all_checked

  # ─── v0.2 stages — uncomment when tick hooks + human stages land ───
  #
  # pr:
  #   type: script
  #   max_runs: 5
  #   hooks:
  #     enter:
  #       - run_shell: { cmd: "cd {{.Task.WorktreeDir}} && git push -u origin HEAD" }
  #       - run_shell:
  #           cmd: "cd {{.Task.WorktreeDir}} && gh pr create --fill || true"
  #           fail_on_nonzero: false
  #     tick:
  #       - wait_for_ci: { min_interval: 30s, timeout: 30m }
  #     exit:
  #       - ci_status:
  #           on_failure:
  #             redirect_to: code
  #             message_template: |
  #               CI failed. Failing checks:
  #               {{.CIFailures}}
  #               See logs at {{.CILogURL}}. Fix and push again.
  #
  # review:
  #   type: agent
  #   role: reviewer
  #   max_runs: 3
  #   hooks:
  #     exit:
  #       # Reviewer appends "### Pass N" under "## Reviews". The regex
  #       # matches every Pass; `[-1]` picks the LAST in document order.
  #       - section_check:
  #           section: "Reviews > /^Pass \\d+$/[-1]"
  #           expect: all_checked
  #           on_fail:
  #             redirect_to: code
  #             message_from_section: "Reviews > /^Pass \\d+$/[-1]"
  #
  # human_review:
  #   type: human
  #   hooks:
  #     tick:
  #       - wait_for_merge: { min_interval: 1m, timeout: 24h }
  #       - ci_status:
  #           min_interval: 5m
  #           on_failure:
  #             redirect_to: code
  #             message_template: "CI went red during human review. Failing: {{.CIFailures}}"

  cleanup:
    type: script
    max_runs: 1
    hooks:
      exit:
        - run_shell: { cmd: "git worktree remove {{.Task.WorktreeDir}}" }
        - run_shell:
            cmd: "git branch -D {{.Task.Branch}} 2>/dev/null || true"
            fail_on_nonzero: false

# ─── Flows ────────────────────────────────────────────────────────────
# Ordered lists of stage names. A task picks one at creation time
# (`stagent new "<title>" --flow <name>`; default is "default").
#
# v0.1 ships only `agent` and `script` stage types, and `enter`/`exit`
# hook slots. So `default` here is the slim flow. The full flow is in
# a comment block below — uncomment in v0.2 when `human` stages, `tick`
# hooks, and the pr/review/human_review stages all land.
flows:
  default:
    - setup           # create worktree, branch, install deps; validate task file
    - code            # implement based on the task file
    - cleanup         # remove worktree, delete branch

  # ─── Uncomment in v0.2 (requires human stages + tick hooks) ───
  # full:
  #   - setup
  #   - code
  #   - pr              # script stage with tick hooks (CI wait)
  #   - review          # agent stage with Pass-N section_check
  #   - human_review    # human stage; completes via `stagent approve` OR PR merge
  #   - cleanup

# ─── Commands (optional) ──────────────────────────────────────────────
# User recipes — like `just`. Templated with the task projection.
# Keep them short; anything complex belongs as a Go command.
commands:

  resume:
    desc: Resume the developer's session in a real Claude Code terminal
    run: |
      SID=$(stagent session {{.Task.ID}} developer)
      cd {{.Task.WorktreeDir}} && claude --resume "$SID"

  # `ship` requires human stages (v0.2):
  # ship:
  #   desc: Approve the current human stage and push any local commits
  #   run: |
  #     stagent approve {{.Task.ID}}
  #     git -C {{.Task.WorktreeDir}} push

# ─── Heartbeat ────────────────────────────────────────────────────────
heartbeat:
  interval: 2s          # how often the runner ticks
